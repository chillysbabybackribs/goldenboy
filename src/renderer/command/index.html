<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'wasm-unsafe-eval'; img-src 'self' blob: data:">
  <title>Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="command.css">
</head>
<body>
  <div class="cc-shell">

    <!-- Header — full width -->
    <header class="cc-header">
      <span class="cc-header-title">Goldenboy</span>
      <div class="cc-zoom-controls cc-header-zoom" aria-label="Chat zoom controls">
        <button class="cc-zoom-btn" id="chatZoomOutBtn" type="button" title="Zoom out" aria-label="Zoom out">−</button>
        <button class="cc-zoom-btn cc-zoom-btn-reset" id="chatZoomResetBtn" type="button" title="Reset zoom" aria-label="Reset zoom">100%</button>
        <button class="cc-zoom-btn" id="chatZoomInBtn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
      </div>
      <span class="cc-header-task" id="taskSummary" hidden></span>
    </header>

    <!-- Main area: left content + right logs -->
    <div class="cc-main">

      <!-- Left column: metric boxes + chat -->
      <div class="cc-left">

        <!-- Chat thread -->
        <div class="cc-chat-shell">
          <div class="cc-chat" id="chatThread">
            <div class="cc-chat-inner" id="chatInner">
              <div class="cc-chat-empty" id="chatEmptyState">
                <div class="cc-idle-brand">Goldenboy</div>
                <div class="cc-idle-chips">
                  <button class="cc-idle-chip" data-prompt="Audit my codebase for dead code and duplicates" type="button">Audit codebase</button>
                  <button class="cc-idle-chip" data-prompt="Research and summarize" type="button">Research</button>
                  <button class="cc-idle-chip" data-prompt="Automate a browser task" type="button">Browser task</button>
                  <button class="cc-idle-chip" data-prompt="Build a web app" type="button">Build</button>
                </div>
              </div>
            </div>
          </div>
          <button class="cc-chat-scroll-btn cc-chat-scroll-top" id="chatScrollTopBtn" type="button" title="Scroll to top" aria-label="Scroll to top" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 10l4-4 4 4"/>
            </svg>
          </button>
          <button class="cc-chat-scroll-btn cc-chat-scroll-bottom" id="chatScrollBottomBtn" type="button" title="Scroll to bottom" aria-label="Scroll to bottom" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 6l4 4 4-4"/>
            </svg>
          </button>
        </div>

        <!-- Input footer — Command Center -->
        <div class="cc-input-footer">
          <button class="cc-copy-btn" id="chatCopyLastBtn" type="button" title="No agent response yet" aria-label="No agent response yet" disabled hidden>Copy</button>

          <!-- Attachment preview sidebar (floats beside the compose shell) -->
          <div class="cc-attach-preview" id="attachPreview" hidden>
            <div class="cc-attach-preview-list" id="attachPreviewList"></div>
          </div>

          <div class="cc-compose-shell">

            <!-- Logs popup — anchored above input box -->
            <div class="cc-logs-overlay" id="logsOverlay" hidden>
              <div class="cc-logs-overlay-header">
                <span class="cc-logs-overlay-title">LOGS</span>
                <button class="cc-logs-overlay-copy" id="logsCopyBtn" type="button" title="Copy logs" aria-label="Copy logs">Copy</button>
                <button class="cc-logs-overlay-clear" id="logsClearBtn" type="button">Clear</button>
                <button class="cc-logs-overlay-close" id="logsCloseBtn" type="button">✕</button>
              </div>
              <div class="cc-logs-stream" id="logStream"></div>
            </div>

            <!-- History popup — anchored above input box -->
            <div class="cc-history-overlay" id="historyOverlay" hidden>
              <div class="cc-history-header">
                <span class="cc-history-title">HISTORY</span>
                <button class="cc-history-new" id="historyNewBtn" type="button">NEW</button>
                <button class="cc-history-close" id="historyCloseBtn" type="button">✕</button>
              </div>
              <div class="cc-history-list" id="historyList"></div>
            </div>

            <!-- Unified input box: inline utilities + textarea + inner bar -->
            <div class="cc-compose-box">
              <textarea class="cc-input" id="chatInput" placeholder="Send a message..." autocomplete="off" rows="2"></textarea>
              <button class="cc-history-btn cc-history-btn-inset" id="chatHistoryBtn" type="button" title="Chat history" aria-label="Chat history">
                <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
                  <path d="M2 4h12M2 8h8M2 12h10"/>
                </svg>
              </button>
              <div class="cc-compose-innerbar">
                <!-- Left: attachments -->
                <div class="cc-compose-left">
                  <button class="cc-attach-btn" id="attachDocBtn" type="button" title="Attach document" aria-label="Attach document">
                    <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                      <path d="M9 1.5H4.5a2 2 0 00-2 2v9a2 2 0 002 2h7a2 2 0 002-2V6L9 1.5z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M9 1.5V6h4.5" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Docs</span>
                  </button>
                  <button class="cc-attach-btn" id="attachImgBtn" type="button" title="Attach image" aria-label="Attach image">
                    <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                      <rect x="1.5" y="2.5" width="13" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.1"/>
                      <circle cx="5.5" cy="6" r="1.25" fill="none" stroke="currentColor" stroke-width="1"/>
                      <path d="M1.5 11l3.5-3.5L8.5 11l2.5-2.5 3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Image</span>
                  </button>
                </div>
                <!-- Center: model selector -->
                <div class="cc-model-selector" id="modelSelector" role="group" aria-label="Select model">
                  <button class="cc-model-btn" id="modelBtnPrimary" type="button" data-owner="gpt-5.4">Codex</button>
                  <button class="cc-model-btn" id="modelBtnHaiku" type="button" data-owner="haiku">Haiku 4.5</button>
                </div>

                <!-- Right: stop + utilities -->
                <div class="cc-compose-actions">
                  <button class="cc-stop-btn" id="chatStopBtn" type="button" title="Stop task" aria-label="Stop task" hidden>STOP</button>
                  <div class="cc-compose-utility-actions">
                    <button class="cc-logs-btn" id="logsBtn" type="button" title="Logs" aria-label="Logs">Logs</button>
                    <button class="cc-new-chat-btn" id="chatNewBtn" type="button" title="Start a new chat" aria-label="Start a new chat">
                      New chat
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Hidden file inputs -->
            <input type="file" id="docFileInput" accept=".txt,.md,.pdf,.json,.csv,.log,.xml,.yaml,.yml,.toml,.html,.css,.js,.ts,.py,.sh,.go,.rs,.c,.cpp,.h,.java" multiple hidden>
            <input type="file" id="imgFileInput" accept="image/*" multiple hidden>
          </div>
        </div>

      </div>

    </div>

    <!-- Status bar — full width -->
    <div class="cc-status">
      <span id="modelLabel">Codex</span>
      <span id="taskCount">tasks: 0</span>
      <span id="tokenStatusLabel">0 in / 0 out</span>
    </div>
  </div>
  <script type="module" src="command.js"></script>
</body>
</html>
